version: 2
updates:
  # nuget packages in the solution
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
    # one PR for all nuget bumps instead of one per package
    groups:
      nuget:
        patterns:
          - "*"
  # github actions used in the workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    # one PR for all action bumps
    groups:
      actions:
        patterns:
          - "*"
